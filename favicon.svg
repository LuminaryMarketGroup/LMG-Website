<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" role="img" aria-label="Luminary Market Group">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2a25"/>
      <stop offset="1" stop-color="#161510"/>
    </linearGradient>
  </defs>
  <!-- dark tile + gold border -->
  <rect x="1" y="1" width="50" height="50" rx="12" fill="url(#t)" stroke="#b08d4f" stroke-width="1.6"/>
  <!-- LMG monogram -->
  <text x="26" y="28.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16" font-weight="700" letter-spacing="0.5" fill="#f4ece0">LMG</text>
  <!-- ascending gold arrow = forward progress -->
  <path d="M14 39 H27 L35 31" fill="none" stroke="#b08d4f"
        stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M30.5 31 H35 V35.5" fill="none" stroke="#b08d4f"
        stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
